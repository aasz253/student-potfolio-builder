<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoPortfolio Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-overlay { animation: modalIn 0.3s ease-out; }
    @keyframes modalIn { from { opacity: 0; } to { opacity: 1; } }
    .code-block { font-family: 'Courier New', monospace; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800">
  <div id="app"></div>
  <div id="modal" class="fixed inset-0 bg-black/90 z-50 hidden overflow-auto"></div>

  <script>
    var state = {
      step: 1,
      formData: {
        fullName: 'Alex Johnson',
        professionalTitle: 'Full Stack Developer',
        bio: 'Passionate developer with 5+ years building scalable web applications.',
        profileImage: '',
        socialLinks: { github: 'https://github.com/alex', linkedin: 'https://linkedin.com/in/alex' },
        skills: ['React', 'Node.js', 'TypeScript', 'Python', 'AWS'],
        projects: [{ name: 'E-Commerce Platform', description: 'Full-stack solution with real-time inventory', liveUrl: 'https://shop.demo.com', githubUrl: 'https://github.com/alex/shop' }],
        experience: [{ jobTitle: 'Senior Developer', company: 'Tech Corp', startDate: 'Jan 2021', endDate: 'Present', bullets: ['Led microservices architecture', 'Reduced API latency by 40%'] }],
        education: { degree: 'B.S. Computer Science', institution: 'State University', graduationYear: '2018' },
        brandColor: '#3B82F6'
      },
      formStep: 1,
      selectedTemplate: null,
      showCode: null
    };

    var templates = [
      { id: 'Terminal', name: 'The Terminal', desc: 'Dark CLI-style', icon: '>_', bg: 'from-gray-900 to-black', textColor: '#00ff00' },
      { id: 'Glassmorphism', name: 'Glassmorphism', desc: 'Modern frosted glass', icon: '◐', bg: 'from-purple-900 to-blue-900', textColor: '#8b5cf6' },
      { id: 'Sidebar', name: 'The Sidebar', desc: 'Classic navigation', icon: '☰', bg: 'from-indigo-900 to-purple-900', textColor: '#6366f1' },
      { id: 'Gradient', name: 'The Gradient', desc: 'Bold gradients', icon: '★', bg: 'from-pink-600 to-purple-600', textColor: '#ec4899' },
      { id: 'Minimalist', name: 'Minimalist', desc: 'Clean elegant', icon: '◇', bg: 'from-gray-100 to-white', textColor: '#374151' },
      { id: 'Magazine', name: 'Magazine', desc: 'Editorial style', icon: 'M', bg: 'from-amber-800 to-amber-600', textColor: '#d97706' },
      { id: 'Cyberpunk', name: 'Cyberpunk', desc: 'Neon cyber aesthetic', icon: '⚡', bg: 'from-cyan-900 to-pink-900', textColor: '#06b6d4' },
      { id: 'Vintage', name: 'Vintage', desc: 'Print-inspired', icon: '✦', bg: 'from-amber-100 to-orange-100', textColor: '#92400e' },
      { id: 'Neobrutalism', name: 'Neobrutalism', desc: 'Bold borders', icon: '■', bg: 'from-rose-500 to-orange-500', textColor: '#f43f5e' },
      { id: 'Startup', name: 'Startup', desc: 'SaaS landing style', icon: '▲', bg: 'from-violet-600 to-indigo-600', textColor: '#7c3aed' }
    ];

    function render() {
      var app = document.getElementById('app');
      var content = '<header class="py-6 px-4"><div class="max-w-7xl mx-auto"><h1 class="text-3xl font-bold text-white">AutoPortfolio Builder</h1><p class="text-purple-200 text-sm mt-1">Create & Preview Your Portfolio</p></div></header>';
      content += '<main class="px-4 pb-12"><div class="max-w-6xl mx-auto">';
      if (state.step === 1) content += renderForm();
      else if (state.step === 2) content += renderGallery();
      else if (state.step === 3) content += renderCodeView();
      content += '</div></main>';
      app.innerHTML = content;
      attachListeners();
    }

    function renderForm() {
      var f = state.formData;
      var s = state.formStep;
      var form = '';
      
      if (s === 1) {
        form = '<h2 class="text-2xl font-bold text-white mb-6">Basic Info</h2><div class="grid gap-4 md:grid-cols-2 mb-4"><div><label class="block text-sm text-purple-200 mb-1">Full Name</label><input type="text" id="fullName" value="' + f.fullName + '" class="w-full px-4 py-3 rounded-lg"></div><div><label class="block text-sm text-purple-200 mb-1">Title</label><input type="text" id="professionalTitle" value="' + f.professionalTitle + '" class="w-full px-4 py-3 rounded-lg"></div></div><div class="mb-4"><label class="block text-sm text-purple-200 mb-1">Bio</label><textarea id="bio" rows="3" class="w-full px-4 py-3 rounded-lg">' + f.bio + '</textarea></div>';
      } else if (s === 2) {
        form = '<h2 class="text-2xl font-bold text-white mb-6">Social Links</h2><div class="grid gap-4 md:grid-cols-2 mb-4"><div><label class="block text-sm text-purple-200 mb-1">GitHub URL</label><input type="url" id="github" value="' + f.socialLinks.github + '" class="w-full px-4 py-3 rounded-lg"></div><div><label class="block text-sm text-purple-200 mb-1">LinkedIn URL</label><input type="url" id="linkedin" value="' + f.socialLinks.linkedin + '" class="w-full px-4 py-3 rounded-lg"></div></div>';
      } else if (s === 3) {
        form = '<h2 class="text-2xl font-bold text-white mb-6">Skills</h2><div class="flex gap-3 mb-4"><input type="text" id="skillInput" class="flex-1 px-4 py-3 rounded-lg" placeholder="Type skill"><button onclick="addSkill()" class="px-6 py-3 bg-green-500 text-white rounded-lg">Add</button></div><div class="flex flex-wrap gap-2">' + f.skills.map(function(skill, i) { return '<span class="px-4 py-2 bg-purple-500/30 text-white rounded-full">' + skill + '<button onclick="removeSkill(' + i + ')" class="ml-2 text-purple-300 hover:text-white">x</button></span>'; }).join('') + '</div>';
      } else if (s === 4) {
        form = '<h2 class="text-2xl font-bold text-white mb-6">Projects</h2>' + f.projects.map(function(p, i) { return '<div class="glass p-4 rounded-xl mb-4"><input type="text" id="projName' + i + '" value="' + p.name + '" class="w-full px-3 py-2 rounded mb-2" placeholder="Project Name"><textarea id="projDesc' + i + '" rows="2" class="w-full px-3 py-2 rounded mb-2" placeholder="Description">' + p.description + '</textarea><div class="grid grid-cols-2 gap-2"><input type="url" id="projLive' + i + '" value="' + p.liveUrl + '" class="px-3 py-2 rounded" placeholder="Live URL"><input type="url" id="projGithub' + i + '" value="' + p.githubUrl + '" class="px-3 py-2 rounded" placeholder="GitHub URL"></div></div>'; }).join('') + '<button onclick="addProject()" class="w-full py-3 border-2 border-dashed border-white/30 text-white/70 rounded-lg hover:border-white/50">+ Add Project</button>';
      } else if (s === 5) {
        form = '<h2 class="text-2xl font-bold text-white mb-6">Experience & Style</h2>' + f.experience.map(function(exp, i) { return '<div class="glass p-4 rounded-xl mb-4"><div class="grid grid-cols-2 gap-2 mb-2"><input type="text" id="expTitle' + i + '" value="' + exp.jobTitle + '" class="px-3 py-2 rounded" placeholder="Job Title"><input type="text" id="expCompany' + i + '" value="' + exp.company + '" class="px-3 py-2 rounded" placeholder="Company"></div></div>'; }).join('') + '<div class="grid gap-4 md:grid-cols-2 mb-4"><div><label class="block text-sm text-purple-200 mb-1">Degree</label><input type="text" id="eduDegree" value="' + f.education.degree + '" class="w-full px-4 py-3 rounded-lg"></div><div><label class="block text-sm text-purple-200 mb-1">Institution</label><input type="text" id="eduInstitution" value="' + f.education.institution + '" class="w-full px-4 py-3 rounded-lg"></div></div><div><label class="block text-sm text-purple-200 mb-1">Brand Color</label><input type="color" id="brandColor" value="' + f.brandColor + '" class="w-full h-12 rounded-lg cursor-pointer"></div>';
      }
      
      return '<div class="glass rounded-2xl shadow-2xl p-8 max-w-2xl mx-auto fade-in"><div class="mb-6"><div class="flex gap-2 mb-2">' + [1,2,3,4,5].map(function(x) { return '<div class="w-3 h-3 rounded-full ' + (state.formStep >= x ? 'bg-blue-500' : 'bg-gray-300') + '"></div>'; }).join('') + '</div><p class="text-gray-500 text-sm">Step ' + state.formStep + ' of 5</p></div>' + form + '<div class="flex justify-between mt-6"><button onclick="prevStep()" class="px-6 py-3 ' + (s === 1 ? 'text-gray-400' : 'text-white hover:bg-white/10') + ' rounded-lg">' + (s === 1 ? '' : 'Previous') + '</button><button onclick="nextStep()" class="px-8 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600">' + (s === 5 ? 'Choose Template' : 'Next') + '</button></div></div>';
    }

    function renderGallery() {
      return '<button onclick="goBack(1)" class="mb-6 text-white/80 hover:text-white">Back to Form</button><h2 class="text-3xl font-bold text-white mb-2">Choose Template</h2><p class="text-purple-200 mb-8">10 templates available</p><div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">' + templates.map(function(t) { return '<div class="glass rounded-xl overflow-hidden shadow-xl cursor-pointer hover:scale-105 transition" onclick="selectTemplate(\'' + t.id + '\')"><div class="h-40 bg-gradient-to-br ' + t.bg + ' flex items-center justify-center"><span class="text-5xl text-white/80">' + t.icon + '</span></div><div class="p-4"><h3 class="font-bold text-gray-800">' + t.name + '</h3><p class="text-gray-500 text-sm mt-1">' + t.desc + '</p><div class="flex gap-2 mt-4"><button onclick="event.stopPropagation(); showPreview(\'' + t.id + '\')" class="flex-1 py-2 bg-gray-100 rounded-lg text-sm hover:bg-gray-200">Preview</button><button onclick="event.stopPropagation(); selectTemplate(\'' + t.id + '\')" class="flex-1 py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600">Select</button></div></div></div>'; }).join('') + '</div>';
    }

    function renderCodeView() {
      var t = templates.find(function(x){return x.id===state.selectedTemplate;});
      var code = generateCode(state.selectedTemplate);
      return '<button onclick="goBack(2)" class="mb-6 text-white/80 hover:text-white">Back to Templates</button><div class="glass rounded-2xl shadow-2xl overflow-hidden"><div class="bg-gray-800 px-4 py-3 flex items-center justify-between border-b border-gray-700"><h3 class="text-white font-bold">' + t.name + ' Template</h3><div class="flex gap-2"><button onclick="showPreview(\'' + state.selectedTemplate + '\')" class="px-4 py-1 bg-purple-500 text-white rounded text-sm hover:bg-purple-600">Preview</button><button onclick="copyCode()" class="px-4 py-1 bg-green-500 text-white rounded text-sm hover:bg-green-600">Copy All</button><button onclick="downloadCode()" class="px-4 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">Download</button></div></div><div class="max-h-[70vh] overflow-auto"><div class="p-6"><div class="mb-4"><h4 class="text-sm font-bold text-gray-500 mb-2">index.html</h4><pre class="code-block bg-gray-900 text-green-400 p-4 rounded-lg overflow-x-auto text-sm whitespace-pre">' + escapeHtml(code.html) + '</pre></div><div class="mb-4"><h4 class="text-sm font-bold text-gray-500 mb-2">styles.css</h4><pre class="code-block bg-gray-900 text-blue-400 p-4 rounded-lg overflow-x-auto text-sm whitespace-pre">' + escapeHtml(code.css) + '</pre></div><div><h4 class="text-sm font-bold text-gray-500 mb-2">script.js</h4><pre class="code-block bg-gray-900 text-yellow-400 p-4 rounded-lg overflow-x-auto text-sm whitespace-pre">' + escapeHtml(code.js) + '</pre></div></div></div></div>';
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function generateCode(templateId) {
      var d = state.formData;
      var accent = d.brandColor || '#3B82F6';
      var skills = d.skills || [];
      var projects = d.projects || [];
      var exp = d.experience || [];
      var social = d.socialLinks || {};
      var edu = d.education || {};
      
      var html = '<!DOCTYPE html>\n<html lang="en>\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>' + d.fullName + ' | Portfolio</title>\n  <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n  <div class="container">\n    <header class="hero">\n      <div class="avatar">' + d.fullName.charAt(0) + '</div>\n      <h1>' + d.fullName + '</h1>\n      <p class="title">' + d.professionalTitle + '</p>\n      <p class="bio">' + d.bio + '</p>\n      <div class="social">\n        <a href="' + social.github + '">GitHub</a>\n        <a href="' + social.linkedin + '">LinkedIn</a>\n      </div>\n    </header>\n    <section class="skills-section">\n      <h2>Skills</h2>\n      <div class="skills">' + skills.map(function(s){return '<span class="skill">' + s + '</span>';}).join('') + '</div>\n    </section>\n    <section class="exp-section">\n      <h2>Experience</h2>' + exp.map(function(e){return '<div class="exp-card"><h3>' + e.jobTitle + '</h3><p class="company">' + e.company + '</p><p class="period">' + e.startDate + ' - ' + e.endDate + '</p></div>';}).join('') + '\n    </section>\n    <section class="projects-section">\n      <h2>Projects</h2>\n      <div class="projects">' + projects.map(function(p){return '<div class="project"><h3>' + p.name + '</h3><p>' + p.description + '</p><div class="links"><a href="' + p.liveUrl + '">Live</a><a href="' + p.githubUrl + '">Code</a></div></div>';}).join('') + '</div>\n    </section>\n    <section class="edu-section">\n      <h2>Education</h2>\n      <div class="edu-card"><h3>' + edu.degree + '</h3><p>' + edu.institution + '</p></div>\n    </section>\n  </div>\n  <script src="script.js"><\/script>\n</body>\n</html>';
      
      var css = '*{margin:0;padding:0;box-sizing:border-box}:root{--accent:' + accent + ';--bg:#f8fafc;--text:#1a1a2e;--muted:#64748b}.container{max-width:900px;margin:0 auto;padding:2rem;font-family:system-ui,sans-serif;background:var(--bg);min-height:100vh}.hero{text-align:center;padding:3rem 0;border-bottom:2px solid #e5e5e5;margin-bottom:3rem}.avatar{width:120px;height:120px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:3rem;color:#fff;font-weight:700}h1{font-size:2.5rem;font-weight:700;margin-bottom:0.5rem;color:var(--text)}.title{font-size:1.25rem;color:var(--accent);font-weight:500;margin-bottom:1rem}.bio{max-width:500px;margin:0 auto 2rem;color:var(--muted);line-height:1.7}.social{display:flex;gap:1rem;justify-content:center}.social a{padding:0.75rem 1.5rem;background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;font-weight:500}section{margin-bottom:3rem;padding-bottom:3rem;border-bottom:1px solid #e5e5e5}h2{font-size:1.75rem;font-weight:600;margin-bottom:1.5rem;color:var(--text)}.skills{display:flex;flex-wrap:wrap;gap:0.75rem}.skill{padding:0.5rem 1rem;background:#fff;border:1px solid #e5e5e5;border-radius:50px;font-size:0.9rem;font-weight:500}.exp-card{background:#fff;padding:1.5rem;border-radius:12px;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}.exp-card h3{font-size:1.1rem;font-weight:600;margin-bottom:0.25rem;color:var(--text)}.exp-card .company{color:var(--accent);font-weight:500;margin-bottom:0.25rem}.exp-card .period{font-size:0.85rem;color:var(--muted)}.projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}.project{background:#fff;padding:1.5rem;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}.project h3{font-size:1.1rem;font-weight:600;margin-bottom:0.5rem;color:var(--text)}.project p{color:var(--muted);margin-bottom:1rem}.project .links{display:flex;gap:1rem}.project a{color:var(--accent);text-decoration:none;font-size:0.9rem;font-weight:500}.edu-card{background:linear-gradient(135deg,var(--accent),#8b5cf6);padding:2rem;border-radius:12px;color:#fff;text-align:center}.edu-card h3{font-size:1.25rem;margin-bottom:0.5rem}.edu-card p{opacity:0.9}';
      
      var js = "document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('a').forEach(function(a){a.setAttribute('target','_blank');a.setAttribute('rel','noopener noreferrer')})});";
      
      return {html: html, css: css, js: js};
    }

    function showPreview(templateId) {
      var d = state.formData;
      var accent = d.brandColor || '#3B82F6';
      var skills = d.skills || [];
      var social = d.socialLinks || {};
      var t = templates.find(function(x){return x.id===templateId;});
      
      var preview = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:' + (t.bg.includes('900') ? '#0f172a' : '#f8fafc') + ';color:#fff;min-height:100vh;padding:2rem}.container{max-width:700px;margin:0 auto;padding:2rem}.avatar{width:100px;height:100px;border-radius:50%;background:' + accent + ';display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2.5rem;color:#fff}h1{font-size:1.75rem;text-align:center;margin-bottom:0.25rem}.title{text-align:center;color:' + accent + ';margin-bottom:1rem}.bio{text-align:center;max-width:400px;margin:0 auto 1.5rem;opacity:0.8}.social{text-align:center;margin-bottom:2rem}.btn{padding:0.5rem 1rem;background:' + accent + ';color:#fff;text-decoration:none;border-radius:6px;margin:0 0.25rem}.section{background:rgba(255,255,255,0.1);padding:1.5rem;border-radius:12px;margin-bottom:1.5rem}h2{color:' + accent + ';margin-bottom:1rem;font-size:1.25rem}.skills{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem}.skill{padding:0.25rem 0.75rem;background:rgba(255,255,255,0.1);border-radius:20px;font-size:0.85rem}.card{background:rgba(255,255,255,0.05);padding:1rem;border-radius:8px;margin-bottom:1rem}.card h3{color:' + accent + ';margin-bottom:0.25rem}</style></head><body><div class="container"><div class="avatar">' + d.fullName.charAt(0) + '</div><h1>' + d.fullName + '</h1><p class="title">' + d.professionalTitle + '</p><p class="bio">' + d.bio + '</p><div class="social"><a href="' + social.github + '" class="btn">GitHub</a><a href="' + social.linkedin + '" class="btn">LinkedIn</a></div><div class="section"><h2>Skills</h2><div class="skills">' + skills.map(function(s){return '<span class="skill">' + s + '</span>';}).join('') + '</div></div></div></body></html>';
      
      var modal = document.getElementById('modal');
      modal.innerHTML = '<div class="w-full max-w-4xl mx-auto mt-8"><div class="bg-gray-800 rounded-t-xl px-4 py-3 flex justify-between items-center"><span class="text-white font-bold">' + t.name + ' Preview</span><button onclick="closeModal()" class="text-white/70 hover:text-white">Close X</button></div><iframe srcdoc="' + preview.replace(/"/g, '&quot;') + '" class="w-full h-[70vh] bg-white rounded-b-xl border-0"></iframe></div>';
      modal.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function selectTemplate(id) {
      state.selectedTemplate = id;
      state.step = 3;
      render();
    }

    function copyCode() {
      var code = generateCode(state.selectedTemplate);
      var full = '<!-- index.html -->\n\n' + code.html + '\n\n<!-- styles.css -->\n\n' + code.css + '\n\n<!-- script.js -->\n\n' + code.js;
      navigator.clipboard.writeText(full).then(function() {
        alert('Code copied to clipboard!');
      });
    }

    function downloadCode() {
      var code = generateCode(state.selectedTemplate);
      var full = '<!-- index.html -->\n\n' + code.html + '\n\n<!-- styles.css -->\n\n' + code.css + '\n\n<!-- script.js -->\n\n' + code.js;
      var blob = new Blob([full], {type: 'text/plain'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'portfolio-' + state.selectedTemplate.toLowerCase() + '.txt';
      a.click();
    }

    function attachListeners() {
      document.querySelectorAll('input, textarea').forEach(function(el) {
        el.addEventListener('change', handleInput);
        el.addEventListener('input', handleInput);
      });
    }

    function handleInput(e) {
      var id = e.target.id;
      var val = e.target.value;
      if (id === 'fullName') state.formData.fullName = val;
      else if (id === 'professionalTitle') state.formData.professionalTitle = val;
      else if (id === 'bio') state.formData.bio = val;
      else if (id === 'github') state.formData.socialLinks.github = val;
      else if (id === 'linkedin') state.formData.socialLinks.linkedin = val;
      else if (id === 'eduDegree') state.formData.education.degree = val;
      else if (id === 'eduInstitution') state.formData.education.institution = val;
      else if (id === 'brandColor') state.formData.brandColor = val;
      else if (id.startsWith('projName')) state.formData.projects[parseInt(id.replace('projName',''))].name = val;
      else if (id.startsWith('projDesc')) state.formData.projects[parseInt(id.replace('projDesc',''))].description = val;
      else if (id.startsWith('projLive')) state.formData.projects[parseInt(id.replace('projLive',''))].liveUrl = val;
      else if (id.startsWith('projGithub')) state.formData.projects[parseInt(id.replace('projGithub',''))].githubUrl = val;
      else if (id.startsWith('expTitle')) state.formData.experience[parseInt(id.replace('expTitle',''))].jobTitle = val;
      else if (id.startsWith('expCompany')) state.formData.experience[parseInt(id.replace('expCompany',''))].company = val;
    }

    function addSkill() {
      var input = document.getElementById('skillInput');
      if (input && input.value.trim()) {
        state.formData.skills.push(input.value.trim());
        input.value = '';
        render();
      }
    }

    function removeSkill(i) { state.formData.skills.splice(i, 1); render(); }
    function addProject() { state.formData.projects.push({name:'',description:'',liveUrl:'',githubUrl:''}); render(); }
    function prevStep() { if (state.formStep > 1) { state.formStep--; render(); } }
    function nextStep() { if (state.formStep < 5) { state.formStep++; } else { state.step = 2; } render(); }
    function goBack(step) { state.step = step; render(); }

    render();
  </script>
</body>
</html>
